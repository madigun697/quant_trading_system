services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quant}
      POSTGRES_USER: ${POSTGRES_USER:-quant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quant}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quant} -d ${POSTGRES_DB:-quant}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  pgadmin:
    image: dpage/pgadmin4:9.8
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5050:80"
    volumes:
      - ./infra/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - pgadmin_data:/var/lib/pgadmin

  airflow-init:
    build:
      context: .
      dockerfile: infra/airflow/Dockerfile
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-quant}:${POSTGRES_PASSWORD:-quant}@postgres:5432/${POSTGRES_DB:-quant}
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      PYTHONPATH: /opt/airflow/project/src
      DBT_PROFILES_DIR: /opt/airflow/project/dbt
      POSTGRES_DB: ${POSTGRES_DB:-quant}
      POSTGRES_USER: ${POSTGRES_USER:-quant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quant}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY:-}
      TIINGO_API_KEY: ${TIINGO_API_KEY:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      SEC_USER_AGENT: ${SEC_USER_AGENT:-}
      DEFAULT_COHORT: ${DEFAULT_COHORT:-us_liquidity_700_v1}
      UNIVERSE_BUFFER_COHORT: ${UNIVERSE_BUFFER_COHORT:-us_liquidity_900_buffer_v1}
      UNIVERSE_BUFFER_SIZE: ${UNIVERSE_BUFFER_SIZE:-900}
      UNIVERSE_TARGET_SIZE: ${UNIVERSE_TARGET_SIZE:-700}
      LIQUIDITY_LOOKBACK_DAYS: ${LIQUIDITY_LOOKBACK_DAYS:-60}
      LIQUIDITY_DISCOVERY_DAYS: ${LIQUIDITY_DISCOVERY_DAYS:-90}
      TIINGO_HOURLY_REQUEST_BUDGET: ${TIINGO_HOURLY_REQUEST_BUDGET:-50}
      TIINGO_MONTHLY_REQUEST_BUDGET: ${TIINGO_MONTHLY_REQUEST_BUDGET:-1000}
      TIINGO_DISCOVERY_BATCH_SIZE: ${TIINGO_DISCOVERY_BATCH_SIZE:-200}
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./:/opt/airflow/project
      - airflow_logs:/opt/airflow/logs
    command: >
      bash -lc "
      airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_ADMIN_USERNAME:-admin}
      --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
      --firstname Airflow
      --lastname Admin
      --role Admin
      --email admin@example.com || true &&
      bash /opt/airflow/project/infra/airflow/scripts/init_connections.sh
      "

  airflow-webserver:
    build:
      context: .
      dockerfile: infra/airflow/Dockerfile
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-quant}:${POSTGRES_PASSWORD:-quant}@postgres:5432/${POSTGRES_DB:-quant}
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      PYTHONPATH: /opt/airflow/project/src
      DBT_PROFILES_DIR: /opt/airflow/project/dbt
      POSTGRES_DB: ${POSTGRES_DB:-quant}
      POSTGRES_USER: ${POSTGRES_USER:-quant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quant}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY:-}
      TIINGO_API_KEY: ${TIINGO_API_KEY:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      SEC_USER_AGENT: ${SEC_USER_AGENT:-}
      DEFAULT_COHORT: ${DEFAULT_COHORT:-us_liquidity_700_v1}
      UNIVERSE_BUFFER_COHORT: ${UNIVERSE_BUFFER_COHORT:-us_liquidity_900_buffer_v1}
      UNIVERSE_BUFFER_SIZE: ${UNIVERSE_BUFFER_SIZE:-900}
      UNIVERSE_TARGET_SIZE: ${UNIVERSE_TARGET_SIZE:-700}
      LIQUIDITY_LOOKBACK_DAYS: ${LIQUIDITY_LOOKBACK_DAYS:-60}
      LIQUIDITY_DISCOVERY_DAYS: ${LIQUIDITY_DISCOVERY_DAYS:-90}
      TIINGO_HOURLY_REQUEST_BUDGET: ${TIINGO_HOURLY_REQUEST_BUDGET:-50}
      TIINGO_MONTHLY_REQUEST_BUDGET: ${TIINGO_MONTHLY_REQUEST_BUDGET:-1000}
      TIINGO_DISCOVERY_BATCH_SIZE: ${TIINGO_DISCOVERY_BATCH_SIZE:-200}
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes:
      - ./:/opt/airflow/project
      - airflow_logs:/opt/airflow/logs
    command: webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: infra/airflow/Dockerfile
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-quant}:${POSTGRES_PASSWORD:-quant}@postgres:5432/${POSTGRES_DB:-quant}
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      PYTHONPATH: /opt/airflow/project/src
      DBT_PROFILES_DIR: /opt/airflow/project/dbt
      POSTGRES_DB: ${POSTGRES_DB:-quant}
      POSTGRES_USER: ${POSTGRES_USER:-quant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quant}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY:-}
      TIINGO_API_KEY: ${TIINGO_API_KEY:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      SEC_USER_AGENT: ${SEC_USER_AGENT:-}
      DEFAULT_COHORT: ${DEFAULT_COHORT:-us_liquidity_700_v1}
      UNIVERSE_BUFFER_COHORT: ${UNIVERSE_BUFFER_COHORT:-us_liquidity_900_buffer_v1}
      UNIVERSE_BUFFER_SIZE: ${UNIVERSE_BUFFER_SIZE:-900}
      UNIVERSE_TARGET_SIZE: ${UNIVERSE_TARGET_SIZE:-700}
      LIQUIDITY_LOOKBACK_DAYS: ${LIQUIDITY_LOOKBACK_DAYS:-60}
      LIQUIDITY_DISCOVERY_DAYS: ${LIQUIDITY_DISCOVERY_DAYS:-90}
      TIINGO_HOURLY_REQUEST_BUDGET: ${TIINGO_HOURLY_REQUEST_BUDGET:-50}
      TIINGO_MONTHLY_REQUEST_BUDGET: ${TIINGO_MONTHLY_REQUEST_BUDGET:-1000}
      TIINGO_DISCOVERY_BATCH_SIZE: ${TIINGO_DISCOVERY_BATCH_SIZE:-200}
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./:/opt/airflow/project
      - airflow_logs:/opt/airflow/logs
    command: scheduler

volumes:
  pgdata:
  pgadmin_data:
  minio_data:
  airflow_logs:
